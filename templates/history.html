
<html>

<head>

<title>History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>Search History</h1>

<table class="table table-striped">

<thead>

<tr>

<th>Repository</th>

<th>Date</th>

</tr>

</thead>

<tbody>

{% for item in history %}

<tr>

<td>

<a href="{{ item.repo_url }}">

{{ item.repo_name }}

</a>

</td>

<td>

{{ item.searched_at }}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
