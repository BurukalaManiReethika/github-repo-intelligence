<!DOCTYPE html>

<html>

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container mt-5">

<h1>

📊 Repository Dashboard

</h1>

<hr>

<div class="row">

<div class="col-md-3">

<div class="card stat-card">

<h3>{{ repo.stars }}</h3>

<p>Stars</p>

</div>

</div>

<div class="col-md-3">

<div class="card stat-card">

<h3>{{ repo.forks }}</h3>

<p>Forks</p>

</div>

</div>

<div class="col-md-3">

<div class="card stat-card">

<h3>{{ repo.watchers }}</h3>

<p>Watchers</p>

</div>

</div>

<div class="col-md-3">

<div class="card stat-card">

<h3>{{ repo.issues }}</h3>

<p>Issues</p>

</div>

</div>

</div>

<h2 class="mt-5">

Repository Score

</h2>

<div class="progress" style="height:30px;">

<div

class="progress-bar bg-success"

style="width:{{ repo.health }}%;">

{{ repo.health }}/100

</div>

</div>

<h2 class="mt-5">

README Preview

</h2>

<pre>

{{ repo.readme }}

</pre>

</div>

</body>

</html>
