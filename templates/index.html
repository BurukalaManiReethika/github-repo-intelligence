
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Insight AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="home-page">
  <nav class="navbar">
    <a href="/" class="brand">🚀 GitHub Insight AI</a>
    <a href="/favorites" class="nav-link">⭐ Favorites</a>
  </nav>

  <main class="hero">
    <h1>Analyze Any GitHub Repository</h1>
    <p class="subtitle">AI-Powered Repository Intelligence Dashboard</p>

    <form method="POST" action="/" class="search-form">
      <div class="input-group">
        <input
          type="text"
          name="repo_url"
          placeholder="https://github.com/owner/repository"
          required
          class="repo-input"
          autofocus
        />
        <button type="submit" class="analyze-btn">Analyze →</button>
      </div>
      {% if error %}
        <p class="error-msg">⚠️ {{ error }}</p>
      {% endif %}
    </form>

    <div class="stats-bar">
      <div class="stat"><span class="stat-num">2M+</span><span class="stat-label">Repositories</span></div>
      <div class="stat"><span class="stat-num">100%</span><span class="stat-label">Free</span></div>
      <div class="stat"><span class="stat-num">AI</span><span class="stat-label">Insights</span></div>
      <div class="stat"><span class="stat-num">📊</span><span class="stat-label">Analytics</span></div>
    </div>
  </main>
</body>
</html>
